<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Salon | San Jose</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">

<style>
*, *::before, *::after {
margin:0;
padding:0;
box-sizing:border-box;
}

:root {
--black:#0d0d0d;
--white:#faf9f7;
--cream:#f2ede6;
--gold:#b8976a;
--muted:#8a8279;
}

body {
font-family:'DM Sans', sans-serif;
background:var(--white);
}

/* HEADER */
header {
position:fixed;
top:0;
left:0;
right:0;
height:64px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 25px;
background:rgba(0,0,0,0.92);
color:white;
z-index:100;
}

.social-icons {
display:flex;
align-items:center;
gap:10px;
}

.social-icons img {
width:22px;
height:22px;
object-fit:cover;
border-radius:4px;
transition:0.3s;
}

.social-icons img:hover {
transform:scale(1.1);
opacity:0.8;
}

.logo {
font-family:'Cormorant Garamond', serif;
font-size:22px;
margin-left:15px;
}

.logo span { color:var(--gold); }

/* NAV */
.nav a {
color:white;
margin:0 10px;
text-decoration:none;
font-size:13px;
letter-spacing:0.08em;
cursor:pointer;
opacity:0.7;
transition:0.3s;
position:relative;
}

.nav a.active {
opacity:1;
color:var(--gold);
}

.nav a::after {
content:'';
position:absolute;
left:0;
bottom:-4px;
width:0%;
height:1px;
background:var(--gold);
transition:0.3s;
}

.nav a.active::after {
width:100%;
}

/* SECTIONS */
.section {
display:none;
padding-top:80px;
min-height:100vh;
}

.section.active {
display:block;
}

/* HERO */
.hero {
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.7)),
url('https://images.unsplash.com/photo-1560066984-138dadb4c035?w=1800&q=80') center/cover;
}

.hero h1 {
font-family:'Cormorant Garamond', serif;
font-size:clamp(50px,8vw,100px);
font-weight:300;
}

.hero h1 em { color:var(--gold); }

.cta-btn {
display:inline-block;
margin-top:25px;
padding:14px 34px;
background:var(--gold);
color:black;
text-decoration:none;
font-size:12px;
cursor:pointer;
border-radius:4px;
}

/* INFO */
.info {
display:grid;
grid-template-columns:1fr 1fr;
}

.info-text {
padding:60px;
background:var(--cream);
}

.info-text h2 {
font-family:'Cormorant+Garamond', serif;
font-size:40px;
margin-bottom:15px;
font-weight:300;
}

/* STATUS */
.open {
color:limegreen;
font-weight:bold;
}

.closed {
color:red;
font-weight:bold;
}

/* FOOTER */
footer {
padding:20px;
text-align:center;
background:black;
color:white;
font-size:12px;
}

/* MOBILE */
@media(max-width:768px){
.info { grid-template-columns:1fr; }
.info-text { padding:40px 20px; }
}
</style>
</head>

<body>

<header>

<div style="display:flex; align-items:center;">
  
  <div class="social-icons">
    <a href="https://www.facebook.com/people/Elite-Salon-Spa/100063563171901/#" target="_blank">
      <img src="assets/images/facebook.jpg" alt="Facebook">
    </a>

    <a href="https://www.yelp.com/biz/elite-salon-and-spa-san-jose-4" target="_blank">
      <img src="assets/images/yelp.jpg" alt="Yelp">
    </a>
  </div>

  <div class="logo">Elite <span>Salon</span></div>
</div>

<nav class="nav">
<a class="tab active" onclick="showTab(event, 'home')">Home</a>
<a class="tab" onclick="showTab(event, 'services')">Services</a>
<a class="tab" onclick="showTab(event, 'promo')">Promotion</a>
<a class="tab" onclick="showTab(event, 'about')">About</a>
<a class="tab" onclick="showTab(event, 'location')">Location</a>
<a class="tab" onclick="showTab(event, 'images')">Images</a>
<a class="tab" onclick="showTab(event, 'booking')">Booking</a>
</nav>

<div>📞 (408) 838-4511</div>
</header>

<!-- LOCATION -->
<section id="location" class="section active">
<div class="info">
<div class="info-text">
<h2>Visit Us</h2>

<p>📍 6049 Snell Ave, San Jose, CA 95123</p>
<p>📞 (408) 838-4511</p>

<!-- ONLY TODAY STATUS -->
<p id="todayStatus" style="font-size:18px; margin-top:15px;"></p>

<p>Mon–Sat: 9AM – 6PM</p>
<p>Sunday: Closed</p>

</div>

<div>
<iframe src="https://maps.google.com/maps?q=6049+Snell+Ave+San+Jose+CA+95123&z=15&output=embed"
width="100%" height="400" style="border:none;"></iframe>
</div>
</div>
</section>

<footer>
© 2026 Elite Salon · San Jose, CA
</footer>

<script>
function showTab(event, tabId) {
document.querySelectorAll('.section').forEach(sec => {
sec.classList.remove('active');
});

document.getElementById(tabId).classList.add('active');

document.querySelectorAll('.tab').forEach(t => {
t.classList.remove('active');
});

event.currentTarget.classList.add('active');
}

/* TODAY ONLY STATUS */
function updateTodayStatus() {
const now = new Date();
const day = now.getDay(); // 0 Sunday - 6 Saturday
const hour = now.getHours();

let isOpen = false;

if (day === 0) {
isOpen = false; // Sunday closed
} else {
isOpen = (hour >= 9 && hour < 18); // Mon–Sat
}

document.getElementById("todayStatus").innerHTML =
isOpen
? `<span class="open">Open Now</span>`
: `<span class="closed">Closed</span>`;
}

updateTodayStatus();
setInterval(updateTodayStatus, 60000);
</script>

</body>
</html>
