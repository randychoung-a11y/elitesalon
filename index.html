<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Salon | San Jose</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<!-- Font Awesome (for real icons) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: 'DM Sans', sans-serif;
  background: #fafafa;
  color: #222;
}

/* Header */
header {
  text-align: center;
  padding: 40px 20px 20px;
}

header h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 42px;
  margin: 0;
}

/* Social Icons */
.social-icons {
  margin-top: 15px;
}

.social-icons a {
  margin: 0 10px;
  font-size: 22px;
  color: #333;
  text-decoration: none;
  transition: 0.3s;
}

.social-icons a:hover {
  color: #c59d5f;
}

/* Container */
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

/* Detail Rows */
.detail-row {
  display: flex;
  align-items: center;
  background: #fff;
  margin-bottom: 15px;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

.d-icon {
  font-size: 20px;
  margin-right: 15px;
}

.d-label {
  font-weight: 500;
  margin-bottom: 5px;
}

/* Form */
form input, form button {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-size: 14px;
}

form button {
  background: #c59d5f;
  color: white;
  border: none;
  cursor: pointer;
}

form button:hover {
  background: #a8844d;
}

</style>
</head>

<body>

<header>
  <h1>Elite Salon</h1>

  <!-- Social Icons -->
  <div class="social-icons">
    <a href="#" target="_blank">
      <i class="fab fa-facebook"></i>
    </a>
    <a href="#" target="_blank">
      <i class="fab fa-yelp"></i>
    </a>
  </div>
</header>

<div class="container">

  <!-- Address -->
  <div class="detail-row">
    <div class="d-icon">📍</div>
    <div>
      <div class="d-label">Location</div>
      <div>San Jose, California</div>
    </div>
  </div>

  <!-- Phone -->
  <div class="detail-row">
    <div class="d-icon">📞</div>
    <div>
      <div class="d-label">Phone</div>
      <div>(408) 123-4567</div>
    </div>
  </div>

  <!-- Booking Form -->
  <div class="detail-row">
    <div class="d-icon">📅</div>
    <div style="width:100%;">
      <div class="d-label">Book Appointment</div>

      <form action="https://formsubmit.co/your@email.com" method="POST">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="text" name="phone" placeholder="Phone Number" required>
        <input type="date" name="date" required>
        <button type="submit">Book Now</button>
      </form>

    </div>
  </div>

</div>

</body>
</html>
