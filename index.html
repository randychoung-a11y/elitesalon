<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Salon | San Jose</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --black: #0d0d0d;
  --white: #faf9f7;
  --cream: #f2ede6;
  --gold:  #b8976a;
  --muted: #8a8279;
}

body { font-family: 'DM Sans', sans-serif; background: var(--white); }

header {
position: fixed; top: 0; left: 0; right: 0;
height: 64px; display:flex; justify-content:space-between; align-items:center;
padding: 0 30px; background: rgba(0,0,0,0.9); color:white;
}

.logo { font-family: 'Cormorant Garamond', serif; font-size: 22px; }
.logo span { color: var(--gold); }

.hero {
height: 100vh;
display:flex; align-items:center; justify-content:center;
text-align:center;
background:
linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)),
url('https://images.unsplash.com/photo-1560066984-138dadb4c035?w=1800&q=80') center/cover;
color:white;
}

.hero h1 {
font-family: 'Cormorant Garamond', serif;
font-size: 72px;
font-weight: 300;
}

.hero h1 em { color: var(--gold); }

.cta-btn {
display:inline-block;
margin-top:20px;
padding:12px 30px;
background: var(--gold);
color:black;
text-decoration:none;
font-size:12px;
letter-spacing:0.1em;
}

.info {
display:grid;
grid-template-columns: 1fr 1fr;
}

.info-text {
padding:60px;
background: var(--cream);
}

.map-wrap iframe {
width:100%;
height:100%;
min-height:400px;
border:none;
}

.booking {
padding:60px;
text-align:center;
background:white;
}

.booking iframe {
width:100%;
height:600px;
border:none;
margin-top:20px;
}

footer {
padding:20px;
background:black;
color:white;
text-align:center;
}

@media(max-width:700px){
.info { grid-template-columns:1fr; }
}
</style>
</head>

<body>

<header>
  <div class="logo">Elite <span>Salon</span></div>
  <div>(408) 838-4511</div>
</header>

<section class="hero">
  <div>
    <h1>Elite <em>Salon</em></h1>
    <p>Hair · Color · Beauty</p>

    <!-- GOOGLE BOOKING BUTTON -->
    <a href="https://calendar.google.com/appointments/schedules/YOUR_APPOINTMENT_LINK"
       target="_blank"
       class="cta-btn">
       Book Appointment
    </a>
  </div>
</section>

<div class="info">
  <div class="info-text">
    <h2>Visit Us</h2>
    <p>📍 6049 Snell Ave<br>San Jose, CA 95123</p>
    <p>📞 (408) 838-4511</p>
    <p>⏰ Mon–Sat: 10AM–6PM</p>
  </div>

  <div class="map-wrap">
    <iframe src="https://maps.google.com/maps?q=6049+Snell+Ave+San+Jose+CA+95123&z=15&output=embed"></iframe>
  </div>
</div>

<!-- EMBEDDED GOOGLE APPOINTMENT SCHEDULE -->
<section class="booking">
  <h2>Book Your Appointment</h2>
  <iframe 
  src="https://calendar.google.com/appointments/schedules/YOUR_APPOINTMENT_LINK?gv=true"
  style="width:100%; height:600px; border:none;">

</section>

<footer>
  <p>© 2026 Elite Salon · San Jose, CA</p>
</footer>

</body>
</html>
