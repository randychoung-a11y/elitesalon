<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Salon | San Jose</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --black: #0d0d0d;
  --white: #faf9f7;
  --cream: #f2ede6;
  --gold:  #b8976a;
  --muted: #8a8279;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--white);
  color: var(--black);
}

header {
position: fixed;
top:0; left:0; right:0;
height:64px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 30px;
background: rgba(0,0,0,0.9);
color:white;
z-index:100;
}

.logo {
font-family: 'Cormorant Garamond', serif;
font-size:22px;
}

.logo span { color: var(--gold); }

.hero {
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:
linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)),
url('https://images.unsplash.com/photo-1560066984-138dadb4c035?w=1800&q=80') center/cover;
color:white;
}

.hero h1 {
font-family: 'Cormorant Garamond', serif;
font-size: clamp(50px, 8vw, 100px);
font-weight:300;
}

.hero h1 em { color: var(--gold); }

.hero p {
margin-top:10px;
letter-spacing:0.1em;
font-size:14px;
}

.cta-btn {
display:inline-block;
margin-top:25px;
padding:14px 36px;
background: var(--gold);
color:black;
text-decoration:none;
font-size:12px;
letter-spacing:0.12em;
border-radius:4px;
transition:0.2s;
}

.cta-btn:hover {
background:#d4b896;
transform:translateY(-2px);
}

.info {
display:grid;
grid-template-columns:1fr 1fr;
}

.info-text {
padding:60px;
background: var(--cream);
}

.info-text h2 {
font-family:'Cormorant Garamond', serif;
font-weight:300;
font-size:40px;
margin-bottom:20px;
}

.map-wrap iframe {
width:100%;
height:100%;
min-height:400px;
border:none;
}

.booking {
padding:60px 30px;
text-align:center;
background:white;
}

.booking h2 {
font-family:'Cormorant Garamond', serif;
font-size:36px;
font-weight:300;
margin-bottom:10px;
}

.booking p {
font-size:13px;
color:var(--muted);
margin-bottom:20px;
}

.booking iframe {
width:100%;
height:650px;
border:none;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

footer {
padding:20px;
background:black;
color:white;
text-align:center;
font-size:12px;
}

@media(max-width:700px){
.info { grid-template-columns:1fr; }
.info-text { padding:40px 20px; }
.booking { padding:40px 20px; }
}
</style>
</head>

<body>

<header>
  <div class="logo">Elite <span>Salon</span></div>
  <div>📞 (408) 838-4511</div>
</header>

<section class="hero">
  <div>
    <h1>Elite <em>Salon</em></h1>
    <p>Hair · Color · Beauty</p>

    <!-- PRIMARY BOOKING BUTTON (ALWAYS WORKS) -->
    <a href="https://calendar.google.com/appointments/schedules/YOUR_APPOINTMENT_LINK"
       target="_blank"
       class="cta-btn">
       Book Appointment
    </a>
  </div>
</section>

<div class="info">
  <div class="info-text">
    <h2>Visit Us</h2>
    <p>📍 6049 Snell Ave<br>San Jose, CA 95123</p>
    <p>📞 (408) 838-4511</p>
    <p>⏰ Mon–Sat: 10AM–6PM<br>Sunday: Closed</p>
  </div>

  <div class="map-wrap">
    <iframe src="https://maps.google.com/maps?q=6049+Snell+Ave+San+Jose+CA+95123&z=15&output=embed"></iframe>
  </div>
</div>

<!-- BOOKING SECTION -->
<section class="booking">
  <h2>Book Your Appointment</h2>
  <p>Select a time that works for you</p>

  <!-- BUTTON (PRIMARY METHOD) -->
  <a href="https://www.jotform.com/build/260986452561162?s=templates"
     target="_blank"
     class="cta-btn">
     Open Booking Page
  </a>

  <!-- OPTIONAL EMBED (MAY NOT WORK FOR ALL ACCOUNTS) -->
  <iframe 
    src="https://www.jotform.com/build/260986452561162?s=templates">
  </iframe>

</section>

<footer>
  <p>© 2026 Elite Salon · San Jose, CA</p>
</footer>

</body>
</html>
