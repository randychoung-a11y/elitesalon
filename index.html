<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Salon | San Jose</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --black: #0d0d0d;
  --white: #faf9f7;
  --cream: #f2ede6;
  --gold:  #b8976a;
  --muted: #8a8279;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--white);
  color: var(--black);
}

/* HEADER */
header {
position: fixed; top:0; left:0; right:0;
height:64px;
display:flex; justify-content:space-between; align-items:center;
padding:0 30px;
background: rgba(0,0,0,0.9);
color:white;
z-index:100;
}

.logo {
font-family: 'Cormorant Garamond', serif;
font-size:22px;
}
.logo span { color: var(--gold); }

/* HERO */
.hero {
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:
linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)),
url('https://images.unsplash.com/photo-1560066984-138dadb4c035?w=1800&q=80') center/cover;
color:white;
}

.hero h1 {
font-family: 'Cormorant Garamond', serif;
font-size: clamp(50px, 8vw, 100px);
font-weight:300;
}
.hero h1 em { color: var(--gold); }

.hero p {
margin-top:10px;
letter-spacing:0.1em;
font-size:14px;
}

/* INFO */
.info {
display:grid;
grid-template-columns:1fr 1fr;
}

.info-text {
padding:60px;
background: var(--cream);
}

.info-text h2 {
font-family:'Cormorant Garamond', serif;
font-size:40px;
font-weight:300;
margin-bottom:20px;
}

.map-wrap iframe {
width:100%;
height:100%;
min-height:400px;
border:none;
}

/* FORM SECTION */
.booking {
padding:60px 30px;
background:white;
}

.section-label {
font-size:11px;
letter-spacing:0.2em;
text-transform:uppercase;
color: var(--gold);
margin-bottom:20px;
}

.form-box {
max-width:500px;
margin:auto;
display:flex;
flex-direction:column;
gap:12px;
}

.form-box input,
.form-box textarea {
width:100%;
padding:10px;
border:1px solid #ddd;
font-size:13px;
border-radius:4px;
}
